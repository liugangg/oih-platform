<!-- ─── Particle background ─────────────────────────────────────────────── -->
<script>
(function(){
  const c=document.getElementById('particles'),ctx=c.getContext('2d');
  let W,H,pts=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;pts=[];
    for(let i=0;i<60;i++) pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.3,
      vx:(Math.random()-0.5)*0.15,vy:(Math.random()-0.5)*0.15,a:Math.random()*0.12+0.03});}
  resize();addEventListener('resize',resize);
  function draw(){ctx.clearRect(0,0,W,H);
    for(const p of pts){p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,212,255,${p.a})`;ctx.fill();}
    // faint connections
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=dx*dx+dy*dy;
      if(d<18000){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
        ctx.strokeStyle=`rgba(0,212,255,${0.03*(1-d/18000)})`;ctx.stroke();}}
    requestAnimationFrame(draw);}
  draw();
})();
</script>

/* ── 3Dmol Viewer (persistent — never unmounts) ──────────────────────────── */
const VIEW_STYLES=['rainbow','bychain','surface','contact','stickCartoon'];
const VIEW_STYLE_LABEL={rainbow:'Rainbow',bychain:'By Chain',surface:'Surface',contact:'Contact',stickCartoon:'Stick+Cartoon'};
const VIEW_STYLE_ICON={rainbow:'🌈',bychain:'🔗',surface:'🫧',contact:'🎯',stickCartoon:'🪄'};

/* Residue classification for binding mode analysis */
const HBOND_DONORS=new Set(['SER','THR','ASN','GLN','TYR','TRP','HIS','ARG','LYS']);
const HYDROPHOBIC=new Set(['ALA','VAL','ILE','LEU','MET','PHE','PRO','TRP']);
const POS_CHARGED=new Set(['ARG','LYS']);
const NEG_CHARGED=new Set(['ASP','GLU']);
const PI_AROMATIC=new Set(['PHE','TYR','TRP','HIS']);

/* Compute chain-chain contacts (<cutoff Angstrom) */
function computeContacts(viewer,cutoff){
  cutoff=cutoff||4.0;
  const model=viewer.getModel(0);
  if(!model)return{contactsA:[],contactsB:[],pairs:[]};
  const atomsA=model.selectedAtoms({chain:'A'});
  const atomsB=model.selectedAtoms({chain:'B'});
  if(!atomsA.length||!atomsB.length)return{contactsA:[],contactsB:[],pairs:[]};
  const setA=new Set(),setB=new Set();
  const resMapA={},resMapB={};
  const pairs=[];
  const grid={};
  const gsize=cutoff;
  atomsB.forEach(function(b){
    const gx=Math.floor(b.x/gsize),gy=Math.floor(b.y/gsize),gz=Math.floor(b.z/gsize);
    const key=gx+','+gy+','+gz;
    (grid[key]=grid[key]||[]).push(b);
  });
  atomsA.forEach(function(a){
    const gx=Math.floor(a.x/gsize),gy=Math.floor(a.y/gsize),gz=Math.floor(a.z/gsize);
    for(var dx=-1;dx<=1;dx++)for(var dy=-1;dy<=1;dy++)for(var dz=-1;dz<=1;dz++){
      var nbrs=grid[(gx+dx)+','+(gy+dy)+','+(gz+dz)];
      if(!nbrs)continue;
      nbrs.forEach(function(b){
        var d=Math.sqrt(Math.pow(a.x-b.x,2)+Math.pow(a.y-b.y,2)+Math.pow(a.z-b.z,2));
        if(d<cutoff){
          setA.add(a.resi);setB.add(b.resi);
          resMapA[a.resi]=a.resn;resMapB[b.resi]=b.resn;
          pairs.push({a:a,b:b,dist:d,resiA:a.resi,resiB:b.resi,resnA:a.resn,resnB:b.resn});
        }
      });
    }
  });
  var bestPairs={};
  pairs.forEach(function(p){
    var key=p.resiA+'-'+p.resiB;
    if(!bestPairs[key]||p.dist<bestPairs[key].dist)bestPairs[key]=p;
  });
  var uniquePairs=Object.values(bestPairs).sort(function(a,b){return a.dist-b.dist});
  return{
    contactsA:Array.from(setA).sort(function(a,b){return a-b}).map(function(r){return{resi:r,resn:resMapA[r]}}),
    contactsB:Array.from(setB).sort(function(a,b){return a-b}).map(function(r){return{resi:r,resn:resMapB[r]}}),
    pairs:uniquePairs,
  };
}

function classifyBindingMode(contacts){
  var hbonds=0,hydrophobic=0,electrostatic=0,pipi=0;
  contacts.pairs.forEach(function(p){
    if(HBOND_DONORS.has(p.resnA)&&HBOND_DONORS.has(p.resnB))hbonds++;
    if(HYDROPHOBIC.has(p.resnA)&&HYDROPHOBIC.has(p.resnB))hydrophobic++;
    if((POS_CHARGED.has(p.resnA)&&NEG_CHARGED.has(p.resnB))||(NEG_CHARGED.has(p.resnA)&&POS_CHARGED.has(p.resnB)))electrostatic++;
    if(PI_AROMATIC.has(p.resnA)&&PI_AROMATIC.has(p.resnB))pipi++;
  });
  return{hbonds:hbonds,hydrophobic:hydrophobic,electrostatic:electrostatic,pipi:pipi};
}

function usePersistentViewer(){
  const containerRef=useRef(null);
  const viewerRef=useRef(null);
  const loadedPathRef=useRef(null);
  const loadingRef=useRef(false);
  const styleRef=useRef('rainbow');
  const contactsRef=useRef(null);

  const applyStyle=(v,styleName,skipRender)=>{
    if(!v)return;
    v.removeAllSurfaces();
    v.removeAllLabels();
    v.removeAllShapes();
    contactsRef.current=null;
    if(styleName==='rainbow'){
      v.setStyle({},{cartoon:{color:'spectrum',opacity:0.92}});
    }else if(styleName==='bychain'){
      v.setStyle({chain:'A'},{cartoon:{color:'#00DDDD',opacity:0.92}});
      v.setStyle({chain:'B'},{cartoon:{color:'#FF8C00',opacity:0.92}});
      v.addSurface($3Dmol.SurfaceType.VDW,{opacity:0.15,color:'#00DDDD'},{chain:'A'});
    }else if(styleName==='surface'){
      v.setStyle({chain:'A'},{cartoon:{color:'#00DDDD',opacity:0.3}});
      v.setStyle({chain:'B'},{cartoon:{color:'#FF8C00',opacity:0.3}});
      v.addSurface($3Dmol.SurfaceType.VDW,{opacity:0.7,color:'#00DDDD'},{chain:'A'});
      v.addSurface($3Dmol.SurfaceType.VDW,{opacity:0.7,color:'#FF8C00'},{chain:'B'});
    }else if(styleName==='contact'){
      v.setStyle({chain:'A'},{cartoon:{color:'#00DDDD',opacity:0.5}});
      v.setStyle({chain:'B'},{cartoon:{color:'#FF8C00',opacity:0.5}});
      var c=computeContacts(v);
      contactsRef.current=c;
      c.contactsA.forEach(function(r){
        v.setStyle({chain:'A',resi:r.resi},{stick:{color:'#FF4444',radius:0.25},cartoon:{color:'#FF4444'}});
      });
      c.contactsB.forEach(function(r){
        v.setStyle({chain:'B',resi:r.resi},{stick:{color:'#FFD700',radius:0.25},cartoon:{color:'#FFD700'}});
      });
      c.pairs.slice(0,10).forEach(function(p){
        v.addCylinder({
          start:{x:p.a.x,y:p.a.y,z:p.a.z},end:{x:p.b.x,y:p.b.y,z:p.b.z},
          radius:0.04,color:'white',dashed:true,fromCap:1,toCap:1,
        });
        v.addLabel(p.dist.toFixed(1),{
          position:{x:(p.a.x+p.b.x)/2,y:(p.a.y+p.b.y)/2,z:(p.a.z+p.b.z)/2},
          fontSize:9,fontColor:'white',backgroundColor:'rgba(0,0,0,0.7)',
          backgroundOpacity:0.7,borderThickness:0,
        });
      });
    }else if(styleName==='stickCartoon'){
      v.setStyle({chain:'A'},{cartoon:{color:'#00DDDD',opacity:0.4},stick:{color:'#00DDDD',radius:0.12}});
      v.setStyle({chain:'B'},{cartoon:{color:'#FF8C00',opacity:0.4},stick:{color:'#FF8C00',radius:0.12}});
    }
    if(!skipRender)v.render();
    styleRef.current=styleName;
  };

  const load=useCallback(async(path)=>{
    if(!path||!containerRef.current)return;
    if(path===loadedPathRef.current&&viewerRef.current)return;
    if(loadingRef.current===path)return;
    loadingRef.current=path;
    if(viewerRef.current){try{viewerRef.current.clear();}catch(e){} viewerRef.current=null;}
    containerRef.current.innerHTML='';
    loadedPathRef.current=null;
    contactsRef.current=null;
    const url=`${API}${path.replace('/data/oih/outputs','/outputs')}`;
    try{
      const r=await fetch(url);
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const data=await r.text();
      if(loadingRef.current!==path||!containerRef.current||!data?.trim())return;
      containerRef.current.innerHTML='';
      const w=containerRef.current.clientWidth||600;
      const v=$3Dmol.createViewer(containerRef.current,{backgroundColor:'#0f1117',width:w,height:400});
      const fmt=path.endsWith('.cif')?'cif':'pdb';
      v.addModel(data,fmt);
      applyStyle(v,styleRef.current);
      v.zoomTo();v.zoom(0.8);v.render();
      viewerRef.current=v;
      loadedPathRef.current=path;
    }catch(e){
      if(loadingRef.current===path&&containerRef.current){
        containerRef.current.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#94a3b8;font-size:12px">Error: ${e.message}</div>`;
      }
    }finally{
      if(loadingRef.current===path)loadingRef.current=false;
    }
  },[]);

  return{containerRef,viewerRef,load,loadedPathRef,applyStyle,styleRef,contactsRef};
}

/* Persistent viewer wrapper — stays in DOM, uses display to show/hide */
function Viewer3DPersistent({viewer3d,visible,path}){
  const prevPathRef=useRef(null);
  const[styleIdx,setStyleIdx]=useState(0);
  const[contacts,setContacts]=useState(null);

/* ── RDKit 2D mol ─────────────────────────────────────────────────────────── */
let _rdkReady=null;
function ensureRDKit(){
  if(_rdkReady) return _rdkReady;
  if(typeof window.initRDKitModule!=='function'){
    console.warn('RDKit not available (CDN may have failed), skipping 2D render');
    return Promise.resolve(null);
  }
  _rdkReady=window.initRDKitModule().then(m=>{window.RDKitModule=m;return m}).catch(e=>{
    console.warn('RDKit init failed:',e);
    _rdkReady=null;
    return null;
  });
  return _rdkReady;
}
function Mol2D({smiles,w=280,h=180,label}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!smiles||!ref.current)return;
    ensureRDKit().then(RDKit=>{
      if(!RDKit||!ref.current){
        if(ref.current) ref.current.innerHTML=`<code style="color:#a0aec0;font-size:10px;word-break:break-all;max-width:${w}px;display:block">${smiles.slice(0,80)}${smiles.length>80?'...':''}</code>`;
        return;
      }
      try{
        const mol=RDKit.get_mol(smiles);
        if(!mol){if(ref.current)ref.current.innerHTML=`<code style="color:#a0aec0;font-size:10px;word-break:break-all">${smiles.slice(0,80)}...</code>`;return;}
        const svg=mol.get_svg_with_highlights(JSON.stringify({
          width:w,height:h,
          backgroundColour:[0.06,0.07,0.10,1],
          highlightColour:[0,0.83,1,0.15],
          bondLineWidth:2.0,
          additionalAtomLabelPadding:0.1,
          atomColourPalette:{
            '-1':[0.85,0.85,0.85],
            '6':[0.85,0.85,0.85],
            '7':[0.35,0.55,1.0],
            '8':[1.0,0.3,0.3],
            '9':[0.0,0.85,0.35],
            '15':[1.0,0.55,0.0],
            '16':[0.9,0.75,0.1],
            '17':[0.0,0.85,0.35]
          },
        }));
        ref.current.innerHTML=svg;
        mol.delete();
      }catch(e){
        if(ref.current) ref.current.innerHTML=`<code style="color:#a0aec0;font-size:10px;word-break:break-all;max-width:${w}px;display:block">${smiles.slice(0,120)}${smiles.length>120?'...':''}</code>`;
      }
    });
  },[smiles,w,h]);
  return(
    <div className="inline-block">
      <div ref={ref}/>
      {label&&<p className="text-[10px] text-[#a0aec0] text-center mt-1 font-mono">{label}</p>}
    </div>
  );
}

/* ── ADMET Radar (canvas) ─────────────────────────────────────────────────── */
function AdmetRadar({data}){
  // data = {logS:-1.5,logD:0.4,BBB:0.8,Tox:0.1,...}
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data)return;
    const c=ref.current,ctx=c.getContext('2d');
    const W=c.width=200,H=c.height=200,cx=W/2,cy=H/2,R=70;
    ctx.clearRect(0,0,W,H);
    const keys=Object.keys(data).slice(0,6);
    const n=keys.length; if(!n)return;
    // draw grid
    for(let ring=1;ring<=3;ring++){
      ctx.beginPath();
      for(let i=0;i<=n;i++){
        const a=Math.PI*2*i/n-Math.PI/2;
        const r=R*ring/3;
        i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
      }ctx.closePath();ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.stroke();}
    // labels
    ctx.font='10px IBM Plex Mono';ctx.fillStyle='#94a3b8';ctx.textAlign='center';
    keys.forEach((k,i)=>{
      const a=Math.PI*2*i/n-Math.PI/2;
      ctx.fillText(k,cx+(R+18)*Math.cos(a),cy+(R+18)*Math.sin(a)+3);});
    // data polygon
    ctx.beginPath();
    keys.forEach((k,i)=>{
      const a=Math.PI*2*i/n-Math.PI/2;
      const v=Math.min(1,Math.max(0,Number(data[k])||0));
      const r=R*v;
      i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    });ctx.closePath();
    ctx.fillStyle='rgba(0,212,255,0.12)';ctx.fill();
    ctx.strokeStyle='#00d4ff';ctx.lineWidth=1.5;ctx.stroke();
    // dots
    keys.forEach((k,i)=>{
      const a=Math.PI*2*i/n-Math.PI/2;
      const v=Math.min(1,Math.max(0,Number(data[k])||0));
      const r=R*v;
      ctx.beginPath();ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),3,0,Math.PI*2);
      ctx.fillStyle='#00d4ff';ctx.fill();
    });
  },[data]);
  return <canvas ref={ref} width={200} height={200}/>;
}

function ExportReportModal({show,onClose}){
  const[step,setStep]=useState('');
  const[progress,setProgress]=useState(0);
  const[reportMd,setReportMd]=useState('');
  const[error,setError]=useState(null);

  const run=useCallback(async()=>{
    setError(null);setReportMd('');
    try{
      setStep('Collecting experiment data...');setProgress(10);

      setStep('Querying Qwen + RAG for analysis...');setProgress(30);
      const resp=await fetch(`${API}/api/v1/report/generate`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({target_name:'HER2',job_prefix:'her2_tier1_v2',include_rag:true}),
      });
      if(!resp.ok)throw new Error(`Report API: ${resp.status}`);
      const result=await resp.json();
      const md=result.report_markdown||'(empty report)';
      setReportMd(md);
      setStep('Report generated');setProgress(70);

      setStep('Generating PDF...');setProgress(80);
      await _generatePDF(md,result.data,result.charts||{});
      setStep('Done!');setProgress(100);
    }catch(e){
      setError(e.message);setStep('Failed');
    }
  },[]);

  useEffect(()=>{if(show)run()},[show]);

  if(!show)return null;
  const modalBg={position:'fixed',inset:0,zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.7)',backdropFilter:'blur(4px)'};
  const modalBox={width:600,maxHeight:'80vh',overflow:'auto',background:'#0f1117',border:'1px solid rgba(255,255,255,0.1)',borderRadius:16,padding:24};

  return(
    <div style={modalBg} onClick={onClose}>
      <div style={modalBox} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-base font-bold text-[#e2e8f0] font-title">Export Report</h2>
          <button onClick={onClose} className="text-[#94a3b8] hover:text-white text-lg">&times;</button>
        </div>
        {/* Progress */}
        <div className="mb-4">
          <div style={{height:4,borderRadius:2,background:'rgba(255,255,255,0.1)',overflow:'hidden'}}>
            <div style={{width:`${progress}%`,height:'100%',background:'linear-gradient(90deg,#00d4ff,#a855f7)',transition:'width 0.5s'}}/>
          </div>
          <p className="text-xs text-[#a0aec0] font-mono mt-2">{step}</p>
          {error&&<p className="text-xs text-bad font-mono mt-1">{error}</p>}
        </div>
        {/* Report preview */}
        {reportMd&&(
          <div className="glass rounded-xl p-4 mt-4" style={{maxHeight:400,overflow:'auto'}}>
            <div className="text-xs text-[#e2e8f0] font-mono leading-relaxed whitespace-pre-wrap"
                 dangerouslySetInnerHTML={{__html:typeof marked!=='undefined'?marked.parse(reportMd):reportMd}}/>
          </div>
        )}
        {/* Action buttons */}
        <div className="flex gap-3 mt-4">
          {reportMd&&<button onClick={()=>{navigator.clipboard?.writeText(reportMd)}}
            className="px-4 py-2 text-xs font-mono rounded-lg bg-cyan/10 text-cyan hover:bg-cyan/20 transition-all">
            Copy Markdown
          </button>}
          {reportMd&&<button onClick={()=>_downloadRawData()}
            className="px-4 py-2 text-xs font-mono rounded-lg bg-purple/10 text-purple hover:bg-purple/20 transition-all">
            Download Raw Data (.zip)
          </button>}
        </div>
      </div>
    </div>
  );
}

async function _generatePDF(md,data,charts){
  if(typeof jspdf==='undefined'&&typeof window.jspdf==='undefined')return;
  const{jsPDF}=window.jspdf;
  const pdf=new jsPDF('p','mm','a4');

  /* Cover */
  pdf.setFontSize(22);pdf.setFont('helvetica','bold');
  pdf.text('OIH Drug Discovery Report',20,30);
  pdf.setFontSize(11);pdf.setFont('helvetica','normal');
  pdf.text(`Target: HER2 (ERBB2) | Date: ${new Date().toISOString().slice(0,10)}`,20,42);
  const af3=data?.af3_results||[];
  const bestIptm=af3.length?Math.max(...af3.map(a=>a.iptm||0)):0;
  pdf.text(`Best ipTM: ${bestIptm.toFixed(2)} | AF3 Designs: ${af3.length} | ADC Designs: ${(data?.adc_results||[]).length}`,20,50);
  pdf.setDrawColor(0,212,255);pdf.line(20,55,190,55);

  /* Body */
  const lines=md.split('\n');
  let y=65;
  lines.forEach(line=>{
    if(y>275){pdf.addPage();y=20}
    if(line.startsWith('# ')){pdf.setFontSize(15);pdf.setFont('helvetica','bold');y+=4}
    else if(line.startsWith('## ')){pdf.setFontSize(12);pdf.setFont('helvetica','bold');y+=3}
    else if(line.startsWith('### ')){pdf.setFontSize(10);pdf.setFont('helvetica','bold');y+=2}
    else{pdf.setFontSize(9);pdf.setFont('helvetica','normal')}
    const text=line.replace(/^#+\s/,'').replace(/\*\*/g,'').replace(/\*/g,'');
    if(text.trim()){
      const split=pdf.splitTextToSize(text,165);
      split.forEach(s=>{if(y>275){pdf.addPage();y=20}pdf.text(s,20,y);y+=5});
    }else{y+=3}
  });

  /* Server-side charts (base64 PNG from matplotlib) */
  if(charts){
    const chartLabels={iptm_chart:'AF3 ipTM Scores',sasa_chart:'Conjugation Site SASA',adc_mol_0:'ADC Conjugate #1',adc_mol_1:'ADC Conjugate #2',adc_mol_2:'ADC Conjugate #3'};
    for(const[key,b64] of Object.entries(charts)){
      if(!b64)continue;
      pdf.addPage();
      pdf.setFontSize(12);pdf.setFont('helvetica','bold');
      pdf.text(chartLabels[key]||key,20,15);
      try{pdf.addImage('data:image/png;base64,'+b64,'PNG',10,20,190,110)}catch(e){}
    }
  }

  pdf.save(`OIH_HER2_Report_${Date.now()}.pdf`);
}

async function _downloadRawData(){

  const zip=new JSZip();
  try{
    /* Pocket scoring log */
    const logResp=await fetch(`${API}/outputs/pocket_scoring_log.jsonl`).catch(()=>null);
    if(logResp?.ok) zip.file('pocket_scoring_log.jsonl',await logResp.text());

    /* AF3 confidence JSONs */
    const af3Folder=zip.folder('af3_confidences');
    for(let i=0;i<3;i++){
      try{
        const confFiles=await(await fetch(`${API}/tasks/?limit=100`)).json();
        /* Just include the raw report data */
      }catch(e){}
    }

    /* ADC SMILES */
    const adcResp=await fetch(`${API}/api/v1/report/generate`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({target_name:'HER2',job_prefix:'her2_tier1_v2',include_rag:false}),
    });
    if(adcResp.ok){
      const d=await adcResp.json();
      zip.file('report_data.json',JSON.stringify(d.data,null,2));
      zip.file('report.md',d.report_markdown||'');
    }

    const blob=await zip.generateAsync({type:'blob'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`OIH_HER2_RawData_${Date.now()}.zip`;
    a.click();URL.revokeObjectURL(url);
  }catch(e){console.error('Zip error:',e)}
}

/* ══════════════════════════════════════════════════════════════════════════ */
/*  MAIN APP                                                                  */
/* ══════════════════════════════════════════════════════════════════════════ */
function App(){
  const[sessionId]=useState(()=>'oih-'+Date.now());
  const[tasks,setTasks]=useState([]);
  const[health,setHealth]=useState(null);
  const[loading,setLoading]=useState(false);
  const[showReport,setShowReport]=useState(false);
  const[activeTab,setActiveTab]=useState('chat');
  const[chat,setChat]=useState([]);
  const[chatInput,setChatInput]=useState('');
  const[rd,setRd]=useState({});  // result data
  const chatEndRef=useRef(null);
  const chatInputRef=useRef(null);
  // Results Hub state
  const[hubTool,setHubTool]=useState(null);   // selected tool group
  const[hubTask,setHubTask]=useState(null);    // selected task_id
  // Tab highlight state
  const[runningTools,setRunningTools]=useState(new Set());
  const[recentDone,setRecentDone]=useState(new Set()); // tools that just completed (3s green)
  // Pipeline preview
  const[showPreview,setShowPreview]=useState(true);
  // Selected task (left sidebar click → right panel)
  const[selectedTaskId,setSelectedTaskId]=useState(null);
  const[userLocked,setUserLocked]=useState(false); // user manually clicked, don't auto-switch
  const[newTaskToast,setNewTaskToast]=useState(null); // toast for new running task
  const[viewerPath,setViewerPath]=useState(null); // explicit 3D viewer path (from "View 3D" buttons)
  const viewer3d=usePersistentViewer(); // persistent 3Dmol viewer — never unmounts
  const[pipelineStarted,setPipelineStarted]=useState(false); // true once a task_id appears while loading
  const[onboardBanner,setOnboardBanner]=useState(false); // onboarding hints banner

  // Cancel task helper
  const cancelTask=async(taskId)=>{
    if(!window.confirm(`Cancel task ${taskId.slice(0,8)}?`))return;
    try{
      const r=await fetch(`${API}/api/v1/tasks/${taskId}`,{method:'DELETE'});
      if(!r.ok){const d=await r.json();alert(d.detail||'Cancel failed')}
    }catch(e){console.error('Cancel failed:',e)}
  };

  // ── Attachment state ──
  const[attachPdb,setAttachPdb]=useState(null);    // {filename, content}
  const[attachFasta,setAttachFasta]=useState(null); // string
  const[attachSmiles,setAttachSmiles]=useState(null); // string
  const[showAttachMenu,setShowAttachMenu]=useState(false);
  const[pasteModal,setPasteModal]=useState(null);    // 'fasta' | 'smiles' | null
  const[pasteValue,setPasteValue]=useState('');
  const pdbInputRef=useRef(null);
  const attachMenuRef=useRef(null);

  // close menu on outside click
  useEffect(()=>{
    if(!showAttachMenu)return;
    const handler=e=>{if(attachMenuRef.current&&!attachMenuRef.current.contains(e.target))setShowAttachMenu(false)};
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[showAttachMenu]);

  const handlePdbFile=e=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>setAttachPdb({filename:file.name,content:reader.result});
    reader.readAsText(file);
    setShowAttachMenu(false);
    e.target.value='';
  };
  const confirmPaste=()=>{
    if(pasteModal==='fasta'&&pasteValue.trim())setAttachFasta(pasteValue.trim());
    if(pasteModal==='smiles'&&pasteValue.trim())setAttachSmiles(pasteValue.trim());
    setPasteModal(null);setPasteValue('');
  };

  // parse PTM info from assistant response
  const parsePtmCard=(text)=>{
    const lines=[];
    const ptmMatch=text.match(/\[PTM检测[：:]?\s*([^\]]+)\]/);
    if(ptmMatch)lines.push({type:'title',text:'🔬 PTM 检测结果'});
    // extract individual items
    const items=[...text.matchAll(/(?:糖基化|磷酸化|二硫键|甲基化|乙酰化)[^,\]）]*/g)];
    items.forEach(m=>{
      const t=m[0];
      if(t.includes('不支持')||t.includes('GROMACS'))lines.push({type:'warn',text:'⚠️ '+t});
      else lines.push({type:'ok',text:'✅ '+t});
    });
    const files=[...text.matchAll(/(?:af3_input|gromacs_ptm_notes|adc_input)\.json/g)];
    files.forEach(m=>lines.push({type:'file',text:'📁 已生成 '+m[0]}));
    return lines.length>1?lines:null;
  };

  // poll
  useEffect(()=>{
    let live=true;
    const poll=async()=>{
      try{
        const[tR,hR]=await Promise.all([
          fetch(`${API}/api/v1/tasks/?limit=40`).then(r=>r.ok?r.json():null).catch(()=>null),
          fetch(`${API}/health`).then(r=>r.ok?r.json():null).catch(()=>null),
        ]);
        if(!live)return;
        if(tR?.tasks){
          setTasks(tR.tasks);
          // track running/recently-done tools for tab highlights
          const nowRunning=new Set(tR.tasks.filter(t=>t.status==='running').map(t=>t.tool));
          const nowRunningIds=new Set(tR.tasks.filter(t=>t.status==='running').map(t=>t.task_id));
          setRunningTools(prev=>{
            for(const t of prev){
              if(!nowRunning.has(t)){
                setRecentDone(rd2=>{const s=new Set(rd2);s.add(t);setTimeout(()=>setRecentDone(rd3=>{const s2=new Set(rd3);s2.delete(t);return s2}),3000);return s});
              }
            }
            // detect new running tasks for toast + pipeline started signal
            for(const id of nowRunningIds){
              if(!prev.has(tR.tasks.find(t=>t.task_id===id)?.tool)){
                setNewTaskToast(id);
                setTimeout(()=>setNewTaskToast(nt=>nt===id?null:nt),5000);
                // Signal to Agent Chat that a pipeline task has started
                setPipelineStarted(true);
                setOnboardBanner(true);
                setTimeout(()=>setOnboardBanner(false),8000);
              }
            }
            return nowRunning;
          });
          // Auto-select: if not user-locked, pick latest running or completed
          setSelectedTaskId(prev=>{
            if(prev&&tR.tasks.find(t=>t.task_id===prev)) return prev; // keep if still exists
            const running=tR.tasks.find(t=>t.status==='running');
            if(running)return running.task_id;
            const completed=tR.tasks.find(t=>t.status==='completed');
            return completed?.task_id||prev;
          });
        }
        if(hR)setHealth(hR);
        // harvest result data
        if(tR?.tasks){
          const d={};
          for(const t of tR.tasks){
            if(t.status!=='completed'||!t.result)continue;
            const r=t.result;
            if(r.output_pdb)d.pdb=r.output_pdb;
            if(r.cif_files?.length)d.cif=r.cif_files[0];
            if(r.smiles)d.smiles=r.smiles;
            if(r.isomeric_smiles)d.smiles=r.isomeric_smiles;
            if(r.sdf_path)d.sdf=r.sdf_path;
            if(r.poses)d.poses=r.poses;
            if(r.output_sdf)d.docking_sdf=r.output_sdf;
            if(r.output_files?.trajectory)d.trajectory=r.output_files.trajectory;
            if(r.output_files?.energy)d.energy=r.output_files.energy;
            if(r.output_files?.rmsd)d.rmsd=r.output_files.rmsd;
            if(r.predictions)d.predictions=r.predictions;
            if(r.conjugation_sites){
              d.sites=r.conjugation_sites;
              if(!d.sites_by_design)d.sites_by_design=[];
              /* Find top chain-A Lys site */
              const caSites=(r.conjugation_sites||[]).filter(s=>(s.chain||'')==='A'&&(s.residue||'').startsWith('K'));
              caSites.sort((a,b)=>Number(b.sasa||0)-Number(a.sasa||0));
              const topLys=caSites[0]?.residue||'?';
              const topSasa=caSites[0]?Number(caSites[0].sasa).toFixed(1):'?';
              /* Assign val number by order (FreeSASA tasks submitted in val_0,1,2 order) */
              const idx=d.sites_by_design.length;
              /* Known mapping: first=val_0(K107), second=val_1(K188), third=val_2(K188) */
              const valLabels=['val_0','val_1','val_2'];
              d.sites_by_design.push({
                designLabel:valLabels[idx]||`design_${idx}`,
                valNum:String(idx),
                sites:r.conjugation_sites,
                topLys:topLys,
                topSasa:topSasa,
              });
            }
            if(r.selected_linkers)d.linkers=r.selected_linkers;
            if(r.adc_smiles){
              d.adc_smiles=r.adc_smiles;
              if(!d.adc_designs)d.adc_designs=[];
              /* Extract job_name from output_sdf path or result field */
              const sdfPath=r.output_sdf||'';
              const sdfMatch=sdfPath.match(/outputs\/([^/]+)\//);
              const jobName=r.job_name||sdfMatch?.[1]||t.input?.job_name||'';
              d.adc_designs.push({
                task_id:t.task_id,
                job_name:jobName,
                adc_smiles:r.adc_smiles,
                covalent:r.covalent,
                embedding_status:r.embedding_status||'?',
                reaction_type:r.reaction_type_used||'?',
                conjugation_site:r.conjugation_site||t.input?.conjugation_site||'?',
                atom_count:r.atom_count||0,
                dar:r.dar_range||'4',
                linker_name:r.linker_name||r.linker_info?.linker_end||'?',
              });
            }
            if(r.linker_smiles)d.linker_smiles=r.linker_smiles;
            if(r.payload_smiles)d.payload_smiles=r.payload_smiles;
            if(r.embedding_status)d.embedding_status=r.embedding_status;
            if(r.reaction_type_used)d.reaction_type=r.reaction_type_used;
            if(r.dar_range)d.dar=r.dar_range;
            if(r.linker_info?.linker_end)d.linker_name=r.linker_info.linker_end;
            if(r.conjugation_site)d.conjugation_site=r.conjugation_site;
            if(r.atom_count)d.atom_count=r.atom_count;
            // Collect AF3 ipTM results for cross-referencing
            if(r.confidence_files?.length){
              if(!d.af3_iptms)d.af3_iptms={};
              const jn=t.input?.job_name||'';
              // Extract val number from job_name like "her2_tier1_v2_af3_val_0"
              const vm=jn.match(/val[_]?(\d+)/);
              if(vm) d.af3_iptms[vm[1]]=r;
            }
            if(r.pdb_files?.length)d.pdb=r.pdb_files[0];
            if(r.sim_time_ns)d.sim_ns=r.sim_time_ns;
            // Binder/ADC pipeline full result
            if(r.steps&&r.adc_design){
              d.pipeline=r;
              // Extract structure from best AF3 design
              const vd=r.steps?.af3_validation?.validated_designs;
              if(vd?.length&&vd[0].af3_structure_path){
                const dir=vd[0].af3_structure_path;
                // AF3 outputs CIF files in the dir
                if(!d.cif&&!d.pdb)d.pdb=dir;
              }
            }
          }
          setRd(prev=>({...prev,...d}));
        }
      }catch{}
    };
    poll();const id=setInterval(poll,2000);
    return()=>{live=false;clearInterval(id)};
  },[]);

  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:'smooth'})},[chat,loading]);

  // dynamic tabs
  const tabs=useMemo(()=>{
    const t=[{id:'chat',label:'Agent Chat',icon:'💬'}];
    if(rd.pdb||rd.cif||viewerPath) t.push({id:'protein',label:'Protein 3D',icon:'🧬'});
    if(rd.smiles) t.push({id:'ligand',label:'Small Molecule',icon:'💊'});
    if(rd.poses) t.push({id:'dock',label:'Docking',icon:'🎯'});
    if(rd.predictions) t.push({id:'admet',label:'ADMET',icon:'📊'});
    if(rd.sites) t.push({id:'sites',label:'Conjugation Sites',icon:'📍'});
    if(rd.linkers||rd.linker_smiles) t.push({id:'linker',label:'Linker',icon:'🔗'});
    if(rd.payload_smiles) t.push({id:'payload',label:'Payload',icon:'💣'});
    if(rd.adc_smiles) t.push({id:'adc',label:'ADC Assembly',icon:'🧪'});
    if(rd.trajectory) t.push({id:'md',label:'MD Results',icon:'⚡'});
    if(rd.pipeline) t.push({id:'pipeline',label:'Pipeline Results',icon:'📋'});
    t.push({id:'hub',label:'Results Hub',icon:'🗂️'});
    return t;
  },[rd,viewerPath]);

  // core send function
  const doSend=async(msg)=>{
    if(!msg.trim()||loading)return;
    setActiveTab('chat');  // auto-switch to chat tab
    // build attachment summary for user bubble
    const attachLabels=[];
    if(attachPdb)attachLabels.push(`📄 ${attachPdb.filename}`);
    if(attachFasta)attachLabels.push(`🧬 序列 ${attachFasta.replace(/^>[^\n]*\n/,'').replace(/\s/g,'').length}aa`);
    if(attachSmiles)attachLabels.push(`💊 ${attachSmiles.length>30?attachSmiles.slice(0,27)+'...':attachSmiles}`);
    const userEntry={role:'user',content:msg,attachLabels:attachLabels.length?attachLabels:null};
    setChat(h=>[...h,userEntry]);
    setLoading(true);
    // build request body
    const body={message:msg,session_id:sessionId};
    if(attachPdb){body.pdb_content=attachPdb.content;body.filename=attachPdb.filename}
    if(attachFasta)body.fasta_sequence=attachFasta;
    if(attachSmiles)body.smiles=attachSmiles;
    // clear attachments after send
    setAttachPdb(null);setAttachFasta(null);setAttachSmiles(null);
    // snapshot task count before request to detect new tasks on timeout
    const taskCountBefore=tasks.length;
    const taskIdsBefore=new Set(tasks.map(t=>t.task_id));
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),1800000); // 30min timeout
      const res=await fetch(`${API}/api/v1/agent/chat`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body),
        signal:ctrl.signal,
      });
      clearTimeout(tid);
      const d=await res.json();
      const reply=d.reply||d.response||d.answer||JSON.stringify(d);
      setChat(h=>[...h,{role:'assistant',content:reply}]);
    }catch(e){
      // On timeout/abort, check if pipeline tasks were spawned during the request
      const isTimeout=e.name==='AbortError'||/timeout/i.test(e.message);
      if(isTimeout){
        // Check current tasks to see if new ones appeared
        try{
          const snap=await fetch(`${API}/api/v1/tasks/?limit=40`).then(r=>r.json()).catch(()=>null);
          const newTasks=(snap?.tasks||[]).filter(t=>!taskIdsBefore.has(t.task_id));
          if(newTasks.length>0){
            setChat(h=>[...h,{role:'assistant',content:'⚡ **Pipeline is running** — track progress in the left panel. The agent request timed out but '+newTasks.length+' task(s) were launched successfully.'}]);
          }else{
            setChat(h=>[...h,{role:'assistant',content:'Request timed out (30min). No new tasks were detected — the agent may still be planning. Try a simpler request or check /tmp/fastapi.log.'}]);
          }
        }catch(_){
          setChat(h=>[...h,{role:'assistant',content:'Request timed out. Check the left panel for any running tasks.'}]);
        }
      }else{
        setChat(h=>[...h,{role:'assistant',content:`Error: ${e.message}`}]);
      }
    }finally{setLoading(false);setPipelineStarted(false)}
  };

  // chat input send
  const sendChat=()=>{
    if(!chatInput.trim())return;
    const msg=chatInput.trim();
    setChatInput('');
    setShowPreview(true); // reset for next input
    doSend(msg);
  };

  /* ── tab content renderer ── */
  const tabContent=()=>{
    switch(activeTab){

    case 'protein':
      const proteinPath=viewerPath||rd.cif||rd.pdb;
      return(<div className="p-4" style={{maxHeight:'calc(100vh - 120px)',overflow:'hidden'}}>
        <div className="flex items-center justify-between mb-3" style={{height:'40px'}}>
          <h3 className="text-sm font-title font-semibold text-[#e2e8f0]">Protein Structure</h3>
          <div className="flex items-center gap-2">
            {viewerPath&&viewerPath!==(rd.cif||rd.pdb)&&(
              <button onClick={()=>setViewerPath(null)} className="text-[10px] font-mono text-[#a0aec0] hover:text-[#e2e8f0] transition-all">Back to default</button>
            )}
            <DlBtn path={proteinPath} label={proteinPath?.endsWith('.cif')?'Download CIF':'Download PDB'}/>
          </div>
        </div>
        <div className="text-[10px] font-mono text-[#a0aec0] mb-2 truncate">{proteinPath?.split('/').pop()}</div>
        {/* viewer container is rendered below, outside switch/case */}
      </div>);

    case 'ligand':
      return(<div className="p-6">
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-sm font-title font-semibold text-[#e2e8f0]">Small Molecule</h3>
          <DlBtn path={rd.sdf} label="Download SDF"/>
        </div>
        <div className="flex items-start gap-6">
          <Mol2D smiles={rd.smiles} w={320} h={220}/>
          <div className="text-xs text-[#a0aec0] space-y-2 font-mono">
            <p className="text-cyan">SMILES</p>
            <p className="text-[#e2e8f0] break-all max-w-sm">{rd.smiles}</p>
          </div>
        </div>
      </div>);

    case 'dock':
      return(<div className="p-4">
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-sm font-title font-semibold text-[#e2e8f0]">Docking Results</h3>
          <DlBtn path={rd.docking_sdf} label="Download SDF"/>
        </div>
        <div className="space-y-1.5">
          {(rd.poses||[]).slice(0,9).map((p,i)=>{
            const aff=p.affinity_kcal_mol||p.minimizedAffinity;
            const cnn=p.CNNscore;
            return(
              <div key={i} className="glass rounded-lg px-4 py-2.5 flex items-center gap-4">
                <span className="text-xs font-mono text-cyan w-8">#{p.pose_id||i+1}</span>
                <div className="flex-1">
                  <div className="flex items-center gap-6 text-xs">
                    <span className="text-[#a0aec0]">Affinity: <span className="text-[#e2e8f0] font-semibold">{aff} kcal/mol</span></span>
                    {cnn!=null&&<span className="text-[#a0aec0]">CNN: <span className="text-ok font-semibold">{Number(cnn).toFixed(3)}</span></span>}
                  </div>
                  {aff&&<Bar value={Math.min(100,Math.abs(aff)*10)} color={Math.abs(aff)>7?'#22c55e':Math.abs(aff)>5?'#f59e0b':'#ef4444'}/>}
                </div>
              </div>
            );
          })}
        </div>
      </div>);

    case 'admet':
      return(<div className="p-4">
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-sm font-title font-semibold text-[#e2e8f0]">ADMET Predictions</h3>
        </div>
        <div className="flex gap-8">
          <div className="overflow-x-auto flex-1">
            <table className="w-full text-xs font-mono">
              <thead><tr className="text-[#a0aec0] border-b border-border">
                {rd.predictions?.[0]&&Object.keys(rd.predictions[0]).map(k=>(
                  <th key={k} className="px-3 py-2 text-left font-medium">{k}</th>
                ))}
              </tr></thead>
              <tbody>
                {(rd.predictions||[]).map((row,i)=>(
                  <tr key={i} className="border-b border-border/50 hover:bg-white/[0.02]">
                    {Object.values(row).map((v,j)=>(
                      <td key={j} className="px-3 py-2 text-[#e2e8f0]">{typeof v==='number'?v.toFixed(4):v}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {rd.predictions?.[0]&&(()=>{
            // build radar data: normalize values to 0-1 range
            const row=rd.predictions[0];
            const radarData={};
            Object.entries(row).forEach(([k,v])=>{
              if(k==='smiles')return;
              // rough normalization
              const n=Number(v);
              if(isNaN(n))return;
              radarData[k]=Math.min(1,Math.max(0,(n+10)/20)); // crude normalization for display
            });
            return <AdmetRadar data={radarData}/>;
          })()}
