              scales:{x:{...chartScaleDefaults,title:{display:true,text:'Backbone #',color:CHART_DARK.font}},y:{...chartScaleDefaults,min:0,max:100,title:{display:true,text:'pLDDT',color:CHART_DARK.font}}}}
          }:null;
          const validPlddt=plddt.filter(v=>v!=null);
          const plddtSummary=validPlddt.length?[
            {label:'Mean',value:(validPlddt.reduce((a,b)=>a+b,0)/validPlddt.length).toFixed(1)},
            {label:'Max',value:Math.max(...validPlddt).toFixed(1)},
            {label:'Min',value:Math.min(...validPlddt).toFixed(1)},
          ]:null;
          return(<div className="space-y-3">
            <div className="flex items-center gap-4">
              <h4 className="text-xs text-[#a0aec0] font-mono">{nBackbones} backbones generated</h4>
              {dur&&<span className="text-[10px] text-[#94a3b8] font-mono">⏱ {dur}</span>}
              <View3DBtn path={r.pdb_files?.[0]}/>
            </div>
            {r.output_dir&&<div className="text-[10px]"><span className="text-[#a0aec0]">Output: </span>{_path(r.output_dir)}</div>}
            {plddtChart?<ChartBox config={plddtChart} height={220} summary={plddtSummary}/>:nBackbones>0?noDataPlaceholder('pLDDT'):null}
          </div>);
        }
        // proteinmpnn
        if(r.fasta_file||tool.includes('proteinmpnn')){
          const seqs=r.sequences||r.designs||[];
          const scores=seqs.map(s=>s.score??s.global_score??null).filter(v=>v!=null);
          const bestIdx=scores.length?scores.indexOf(Math.min(...scores)):-1;
          const scoreChart=scores.length>1?{
            type:'line',
            data:{labels:scores.map((_,i)=>`${i+1}`),datasets:[{
              data:scores,borderColor:CHART_DARK.cyan,backgroundColor:CHART_DARK.cyan+'33',
              pointBackgroundColor:scores.map((_,i)=>i===bestIdx?CHART_DARK.bad:CHART_DARK.cyan),
              pointRadius:scores.map((_,i)=>i===bestIdx?6:2),fill:true,tension:0.3,borderWidth:1.5,
            }]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:'MPNN sequence scores',color:CHART_DARK.font,font:{size:11,family:'IBM Plex Mono'}}},
              scales:{x:{...chartScaleDefaults,title:{display:true,text:'Design #',color:CHART_DARK.font}},y:{...chartScaleDefaults,title:{display:true,text:'Score (lower=better)',color:CHART_DARK.font}}}}
          }:null;
          const scoreSummary=scores.length?[
            {label:'Best',value:Math.min(...scores).toFixed(3)},
            {label:'Mean',value:(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(3)},
            {label:'Count',value:scores.length},
          ]:null;
          return(<div className="space-y-3">
            <div className="flex items-center gap-4 text-xs font-mono">
              <span className="text-[#a0aec0]">FASTA: {_path(r.fasta_file)}</span>
              {seqs.length>0&&<span className="text-[#e2e8f0]">{seqs.length} sequences</span>}
            </div>
            {scoreChart?<ChartBox config={scoreChart} height={220} summary={scoreSummary}/>:seqs.length>0?noDataPlaceholder('score'):null}
          </div>);
        }
        // alphafold3
        if(tool.includes('alphafold3')||tool==='af3'||r.cif_files){
          // Try to build scatter from validated_designs (pipeline context) or single result
          const vd=r.validated_designs||[];
          const hasScatter=vd.length>0&&vd.some(d=>d.iptm!=null);
          const scatterData=vd.filter(d=>d.iptm!=null).map(d=>({
            x:d.mpnn_score??0,y:d.iptm,
            bg:d.confidence==='high'?CHART_DARK.ok:d.confidence==='low_confidence'?CHART_DARK.warn:CHART_DARK.bad,
          }));
          const scatterChart=hasScatter?{
            type:'scatter',
            data:{datasets:[{data:scatterData.map(d=>({x:d.x,y:d.y})),
              pointBackgroundColor:scatterData.map(d=>d.bg),pointRadius:6,pointHoverRadius:8,borderWidth:0}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:'ipTM vs MPNN score',color:CHART_DARK.font,font:{size:11,family:'IBM Plex Mono'}},
              tooltip:{callbacks:{label:ctx=>`ipTM: ${ctx.parsed.y.toFixed(3)} | MPNN: ${ctx.parsed.x.toFixed(3)}`}}},
              scales:{x:{...chartScaleDefaults,title:{display:true,text:'MPNN score',color:CHART_DARK.font}},y:{...chartScaleDefaults,min:0,max:1,title:{display:true,text:'ipTM',color:CHART_DARK.font}}}}
          }:null;
          // Radar for single result with iptm/ptm/ranking_score
          const hasRadar=r.iptm!=null||r.ptm!=null||r.ranking_score!=null;
          const radarChart=hasRadar?{
            type:'radar',
            data:{labels:['ipTM','pTM','Ranking','Confidence'],datasets:[{
              data:[r.iptm??0,r.ptm??0,r.ranking_score??0,r.fraction_disordered!=null?(1-r.fraction_disordered):0.5],
              borderColor:CHART_DARK.cyan,backgroundColor:CHART_DARK.cyan+'22',pointBackgroundColor:CHART_DARK.cyan,borderWidth:1.5,pointRadius:3,
            }]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:'Structure quality',color:CHART_DARK.font,font:{size:11,family:'IBM Plex Mono'}}},
              scales:{r:{beginAtZero:true,max:1,ticks:{display:false,stepSize:0.25},grid:{color:CHART_DARK.grid},pointLabels:{color:CHART_DARK.font,font:{size:10,family:'IBM Plex Mono'}}}}}
          }:null;
          const af3Summary=[
            r.iptm!=null&&{label:'ipTM',value:Number(r.iptm).toFixed(3)},
            r.ptm!=null&&{label:'pTM',value:Number(r.ptm).toFixed(3)},
            r.cif_files&&{label:'CIF files',value:r.cif_files.length},
          ].filter(Boolean);
          return(<div className="space-y-3">
            <div className="flex items-center gap-4 text-xs font-mono flex-wrap">
              {r.iptm!=null&&<span><span className="text-[#a0aec0]">ipTM: </span><span className="text-cyan font-semibold">{r.iptm}</span></span>}
              {r.ptm!=null&&<span><span className="text-[#a0aec0]">pTM: </span><span className="text-[#e2e8f0]">{r.ptm}</span></span>}
              {r.cif_files?.[0]&&<span>{_path(r.cif_files[0])}</span>}
              <View3DBtn path={r.cif_files?.[0]||r.structure_path}/>
            </div>
            {scatterChart&&<ChartBox config={scatterChart} height={220}/>}
            {radarChart&&!scatterChart&&<ChartBox config={radarChart} height={220} summary={af3Summary}/>}
          </div>);
        }
        // gnina/autodock/docking
        if(r.poses?.length){
          const top=r.poses.slice(0,10);
          const affinities=top.map(p=>p.affinity_kcal_mol??p.minimizedAffinity??null);
          const cnnScores=top.map(p=>p.CNNscore??null);
          const hasCnn=cnnScores.some(v=>v!=null);
          // Horizontal bar: binding affinity
          const barChart=affinities.some(v=>v!=null)?{
            type:'bar',
            data:{labels:top.map((p,i)=>`Pose ${p.pose_id||i+1}`),datasets:[{
              data:affinities.map(v=>v!=null?Math.abs(v):0),
              backgroundColor:affinities.map(v=>{const a=Math.abs(v||0);return a>7?CHART_DARK.ok:a>5?CHART_DARK.warn:CHART_DARK.bad}),
              borderWidth:0,borderRadius:2,
            }]},
            options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:'Binding affinity (|kcal/mol|)',color:CHART_DARK.font,font:{size:11,family:'IBM Plex Mono'}},
              tooltip:{callbacks:{label:ctx=>`-${ctx.parsed.x.toFixed(2)} kcal/mol`}}},
              scales:{x:{...chartScaleDefaults,title:{display:true,text:'|Affinity| kcal/mol',color:CHART_DARK.font}},y:{...chartScaleDefaults}}}
          }:null;
          // Scatter: affinity vs CNNscore
          const scatterChart=hasCnn?{
            type:'scatter',
            data:{datasets:[{data:top.filter(p=>p.CNNscore!=null&&(p.affinity_kcal_mol??p.minimizedAffinity)!=null).map(p=>({
              x:p.affinity_kcal_mol??p.minimizedAffinity,y:p.CNNscore})),
              pointBackgroundColor:CHART_DARK.cyan,pointRadius:5,pointHoverRadius:7,borderWidth:0}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:'Affinity vs CNNscore',color:CHART_DARK.font,font:{size:11,family:'IBM Plex Mono'}},
              tooltip:{callbacks:{label:ctx=>`${ctx.parsed.x.toFixed(2)} kcal/mol | CNN: ${ctx.parsed.y.toFixed(3)}`}}},
              scales:{x:{...chartScaleDefaults,title:{display:true,text:'Affinity (kcal/mol)',color:CHART_DARK.font}},y:{...chartScaleDefaults,min:0,max:1,title:{display:true,text:'CNNscore',color:CHART_DARK.font}}}}
          }:null;
          const validAff=affinities.filter(v=>v!=null);
          const dockSummary=validAff.length?[
            {label:'Best',value:Math.min(...validAff).toFixed(2)+' kcal/mol'},
            {label:'Mean',value:(validAff.reduce((a,b)=>a+b,0)/validAff.length).toFixed(2)},
            {label:'Poses',value:r.poses.length},
          ]:null;
          return(<div className="space-y-3">
            {r.output_sdf&&<div className="text-[10px] font-mono"><span className="text-[#a0aec0]">SDF: </span>{_path(r.output_sdf)}</div>}
            {barChart&&<ChartBox config={barChart} height={Math.max(150,top.length*28)} summary={dockSummary}/>}
            {scatterChart&&<ChartBox config={scatterChart} height={200}/>}
          </div>);
        }
        // gromacs
        if(tool.includes('gromacs')||r.output_files?.trajectory){
          const rmsdData=r.rmsd||r.rmsd_data||[];
          const energyData=r.energy||r.energy_data||[];
          const hasRmsd=rmsdData.length>1;
          const hasEnergy=energyData.length>1;
          const rmsdChart=hasRmsd?{
            type:'line',
            data:{labels:rmsdData.map(d=>d.time??d.t??d[0]),datasets:[
              {data:rmsdData.map(d=>d.rmsd??d.value??d[1]),borderColor:CHART_DARK.cyan,backgroundColor:CHART_DARK.cyan+'22',fill:true,tension:0.3,borderWidth:1.5,pointRadius:0,label:'RMSD'},
              {data:rmsdData.map(()=>2),borderColor:CHART_DARK.warn+'88',borderDash:[4,4],borderWidth:1,pointRadius:0,label:'2 Å threshold'},
            ]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:CHART_DARK.font,font:{size:9}},position:'top'},title:{display:true,text:'RMSD vs Time',color:CHART_DARK.font,font:{size:11,family:'IBM Plex Mono'}}},
              scales:{x:{...chartScaleDefaults,title:{display:true,text:'Time (ns)',color:CHART_DARK.font}},y:{...chartScaleDefaults,title:{display:true,text:'RMSD (Å)',color:CHART_DARK.font}}}}
          }:null;
          const energyChart=hasEnergy?{
            type:'line',
            data:{labels:energyData.map(d=>d.time??d.t??d[0]),datasets:[
              {data:energyData.map(d=>d.potential??d.energy??d[1]),borderColor:CHART_DARK.purple,borderWidth:1.5,pointRadius:0,tension:0.3,label:'Potential Energy',yAxisID:'y'},
              ...(energyData[0]?.temperature!=null?[{data:energyData.map(d=>d.temperature),borderColor:CHART_DARK.bad+'aa',borderWidth:1,pointRadius:0,tension:0.3,label:'Temperature',yAxisID:'y1'}]:[]),
            ]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:CHART_DARK.font,font:{size:9}},position:'top'},title:{display:true,text:'Energy / Temperature',color:CHART_DARK.font,font:{size:11,family:'IBM Plex Mono'}}},
              scales:{x:{...chartScaleDefaults,title:{display:true,text:'Time (ns)',color:CHART_DARK.font}},y:{...chartScaleDefaults,position:'left',title:{display:true,text:'Potential (kJ/mol)',color:CHART_DARK.font}},
                ...(energyData[0]?.temperature!=null?{y1:{...chartScaleDefaults,position:'right',grid:{drawOnChartArea:false},title:{display:true,text:'Temp (K)',color:CHART_DARK.font}}}:{})}}
          }:null;
          const traj=r.output_files?.trajectory||r.output_files?.xtc;
          return(<div className="space-y-3">
            <div className="flex items-center gap-4 text-xs font-mono flex-wrap">
              {r.sim_time_ns&&<span><span className="text-[#a0aec0]">Duration: </span><span className="text-[#e2e8f0]">{r.sim_time_ns} ns</span></span>}
              {traj&&<span>{_path(traj)}</span>}
            </div>
            {rmsdChart?<ChartBox config={rmsdChart} height={220}/>:null}
            {energyChart?<ChartBox config={energyChart} height={220}/>:null}
            {!hasRmsd&&!hasEnergy&&(<div className="glass rounded-lg p-3 text-xs text-[#a0aec0] font-mono">
              <p>MD 轨迹文件已生成，可下载后用 gmx rms / gmx energy 分析</p>
              {r.output_files&&Object.entries(r.output_files).map(([k,v])=><div key={k} className="mt-1">{k}: {_path(v)}</div>)}
            </div>)}
          </div>);
        }
        // chemprop / ADMET
        if(r.predictions){
          const preds=r.predictions;
          // Build radar: normalize each property to 0-1 for visualization
          const propKeys=preds[0]?Object.keys(preds[0]).filter(k=>typeof preds[0][k]==='number'):[];
          const admetLabels={'esol':'Solubility','freesolv':'Hydration','lipophilicity':'Lipophilicity','bbbp':'BBB','tox21':'Toxicity','solubility':'Solubility','logP':'LogP'};
          const radarChart=propKeys.length>=3&&preds.length<=6?{
            type:'radar',
            data:{labels:propKeys.map(k=>admetLabels[k]||k),datasets:preds.map((row,i)=>{
              const colors=[CHART_DARK.cyan,CHART_DARK.purple,CHART_DARK.ok,CHART_DARK.warn,CHART_DARK.pink,CHART_DARK.blue];
              const vals=propKeys.map(k=>{const v=row[k];return typeof v==='number'?Math.min(1,Math.max(0,v)):0});
              return{data:vals,borderColor:colors[i%colors.length],backgroundColor:colors[i%colors.length]+'22',borderWidth:1.5,pointRadius:3,pointBackgroundColor:colors[i%colors.length],label:row.smiles?.slice(0,20)||row.name||`Mol ${i+1}`};
            })},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:CHART_DARK.font,font:{size:9}},position:'top'},title:{display:true,text:'ADMET property radar',color:CHART_DARK.font,font:{size:11,family:'IBM Plex Mono'}}},
              scales:{r:{beginAtZero:true,max:1,ticks:{display:false,stepSize:0.25},grid:{color:CHART_DARK.grid},pointLabels:{color:CHART_DARK.font,font:{size:10,family:'IBM Plex Mono'}}}}}
          }:null;
          // Heatmap as stacked bar (approximate)
          const heatChart=propKeys.length>0&&preds.length>1?{
            type:'bar',
            data:{labels:preds.map((row,i)=>row.smiles?.slice(0,12)||row.name||`Mol ${i+1}`),
              datasets:propKeys.map((k,j)=>{
                const colors=[CHART_DARK.cyan,CHART_DARK.purple,CHART_DARK.ok,CHART_DARK.warn,CHART_DARK.pink];
                return{label:admetLabels[k]||k,data:preds.map(row=>typeof row[k]==='number'?row[k]:0),backgroundColor:colors[j%colors.length]+'88',borderWidth:0,borderRadius:2};
              })},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:CHART_DARK.font,font:{size:9}},position:'top'},title:{display:true,text:'ADMET comparison',color:CHART_DARK.font,font:{size:11,family:'IBM Plex Mono'}}},
              scales:{x:{...chartScaleDefaults,stacked:false},y:{...chartScaleDefaults,stacked:false}}}
          }:null;
          return(<div className="space-y-3">
            {radarChart?<ChartBox config={radarChart} height={250}/>:null}
            {heatChart&&!radarChart?<ChartBox config={heatChart} height={220}/>:null}
            <table className="w-full text-[10px] font-mono"><thead><tr className="border-b border-border">
              {propKeys.map(k=><th key={k} className="px-2 py-1 text-left text-[#a0aec0]">{admetLabels[k]||k}</th>)}
            </tr></thead><tbody>
              {preds.map((row,i)=><tr key={i} className="border-b border-border/30">
                {propKeys.map((k,j)=><td key={j} className="px-2 py-1 text-[#e2e8f0]">{typeof row[k]==='number'?row[k].toFixed(4):String(row[k]??'—')}</td>)}
              </tr>)}
            </tbody></table>
          </div>);
        }
        // fetch_molecule
        if(r.smiles&&(tool.includes('fetch_molecule')||r.cid)) return(<div className="flex items-start gap-4">
          <Mol2D smiles={r.smiles} w={260} h={160}/>
          <div className="text-xs font-mono space-y-1.5">
            {r.iupac_name&&<div><span className="text-[#a0aec0]">Name: </span><span className="text-[#e2e8f0]">{r.iupac_name}</span></div>}
            {r.cid&&<div><span className="text-[#a0aec0]">CID: </span><span className="text-[#e2e8f0]">{r.cid}</span></div>}
            {r.molecular_weight&&<div><span className="text-[#a0aec0]">MW: </span><span className="text-[#e2e8f0]">{r.molecular_weight}</span></div>}
            <div><span className="text-[#a0aec0]">SMILES: </span><span className="text-[#e2e8f0] break-all">{r.smiles?.slice(0,60)}</span><CopyBtn text={r.smiles}/></div>
            {r.sdf_path&&<div><span className="text-[#a0aec0]">SDF: </span>{_path(r.sdf_path)}</div>}
          </div>
        </div>);
        // freesasa
        if(r.conjugation_sites?.length) return(<div>
          <h4 className="text-xs text-[#a0aec0] font-mono mb-2">Conjugation Sites ({r.conjugation_sites.length})</h4>
          <div className="grid grid-cols-3 gap-2">{r.conjugation_sites.map((s,i)=>(
            <div key={i} className="glass rounded-lg px-3 py-2 text-center">
              <span className="text-cyan font-mono font-bold text-sm">{s.residue||'—'}</span>
              <p className="text-[10px] text-[#a0aec0]">{s.sasa?Number(s.sasa).toFixed(1)+' Ų':'—'}</p>
              {s.type&&<p className="text-[10px] text-purple">{s.type}</p>}
            </div>
          ))}</div>
        </div>);
        // pipeline — charts + compact summary
        if(r.steps||r.adc_design){
          const ps=r.steps||{};const pa=r.adc_design||{};
          const pAf3=ps.af3_validation||{};const pVd=pAf3.validated_designs||[];
          const pRfd=ps.rfdiffusion||{};const pMpnn=ps.proteinmpnn||{};
          const pBest=pVd[0]||{};const pFasta=pMpnn.designs?.[0]?.fasta_file;

          // Funnel chart: design screening
          const nRfd=pRfd.pdb_files?.length||0;
          const nMpnn=pMpnn.designs?.reduce?.((a,d)=>(d.sequences?.length||0)+a,0)||pMpnn.designs?.length||0;
          const nAf3Tested=pAf3.total_tested||0;
          const nAf3Passed=pAf3.passed||0;
          const nAdc=pa.adc_smiles?1:0;
          const funnelSteps=[
            {label:'RFdiffusion',count:nRfd,color:CHART_DARK.cyan},
            {label:'ProteinMPNN',count:nMpnn,color:CHART_DARK.purple},
            {label:'AF3 tested',count:nAf3Tested,color:CHART_DARK.blue},
            {label:'AF3 passed',count:nAf3Passed,color:CHART_DARK.ok},
            {label:'ADC built',count:nAdc,color:CHART_DARK.pink},
          ].filter(s=>s.count>0||s.label==='AF3 passed');
          const funnelChart=funnelSteps.length>1?{
            type:'bar',
            data:{labels:funnelSteps.map(s=>s.label),datasets:[{
              data:funnelSteps.map(s=>s.count),backgroundColor:funnelSteps.map(s=>s.color),
              borderWidth:0,borderRadius:4,barPercentage:0.7,
            }]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:'Design screening funnel',color:CHART_DARK.font,font:{size:11,family:'IBM Plex Mono'}},
              tooltip:{callbacks:{label:ctx=>ctx.parsed.y+' designs'}}},
              scales:{x:{...chartScaleDefaults},y:{...chartScaleDefaults,title:{display:true,text:'Count',color:CHART_DARK.font}}}}
          }:null;

          // AF3 scatter: ipTM vs MPNN score
          const af3Scatter=pVd.length>0&&pVd.some(d=>d.iptm!=null)?{
            type:'scatter',
            data:{datasets:[{data:pVd.filter(d=>d.iptm!=null).map(d=>({x:d.mpnn_score??0,y:d.iptm})),
              pointBackgroundColor:pVd.filter(d=>d.iptm!=null).map(d=>d.confidence==='high'?CHART_DARK.ok:d.confidence==='low_confidence'?CHART_DARK.warn:CHART_DARK.bad),
              pointRadius:7,pointHoverRadius:9,borderWidth:0}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:'AF3 ipTM vs MPNN score',color:CHART_DARK.font,font:{size:11,family:'IBM Plex Mono'}},
              tooltip:{callbacks:{label:ctx=>`ipTM: ${ctx.parsed.y.toFixed(3)} | MPNN: ${ctx.parsed.x.toFixed(3)}`}},
              annotation:{annotations:{threshold:{type:'line',yMin:0.6,yMax:0.6,borderColor:CHART_DARK.warn+'88',borderDash:[4,4],borderWidth:1}}}},
              scales:{x:{...chartScaleDefaults,title:{display:true,text:'MPNN score',color:CHART_DARK.font}},y:{...chartScaleDefaults,min:0,max:1,title:{display:true,text:'ipTM',color:CHART_DARK.font}}}}
          }:null;

          // ADC radar
          const adcRadar=pa.iptm!=null||pa.dar!=null?{
            type:'radar',
            data:{labels:['ipTM','DAR/4','Linker stability','Payload potency','MW ratio'],datasets:[{
              data:[pa.iptm??0,(pa.dar??0)/4,pa.linker?0.8:0,pa.payload?0.9:0,pa.estimated_mw?Math.min(1,150000/(pa.estimated_mw||150000)):0.5],
              borderColor:CHART_DARK.cyan,backgroundColor:CHART_DARK.cyan+'22',pointBackgroundColor:CHART_DARK.cyan,borderWidth:1.5,pointRadius:3,
            }]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:'ADC properties',color:CHART_DARK.font,font:{size:11,family:'IBM Plex Mono'}}},
              scales:{r:{beginAtZero:true,max:1,ticks:{display:false,stepSize:0.25},grid:{color:CHART_DARK.grid},pointLabels:{color:CHART_DARK.font,font:{size:10,family:'IBM Plex Mono'}}}}}
          }:null;

          const dls=[];
          if(pBest.af3_structure_path) dls.push({label:'Best PDB',path:pBest.af3_structure_path});
          if(pFasta) dls.push({label:'FASTA',path:pFasta});
          if(pa.adc_structure_path) dls.push({label:'ADC SDF',path:pa.adc_structure_path});
          return(<div className="space-y-4">
            <h4 className="text-xs text-cyan font-mono">{r.job_name||'Binder Design Pipeline'}{r.dry_run===true?' (dry run)':''}</h4>
            {/* Funnel + AF3 scatter side by side */}
            <div className="grid grid-cols-2 gap-3">
              {funnelChart?<div className="glass rounded-lg p-3"><ChartBox config={funnelChart} height={200}/></div>:null}
              {af3Scatter?<div className="glass rounded-lg p-3"><ChartBox config={af3Scatter} height={200}/></div>:null}
              {!funnelChart&&!af3Scatter&&<div className="col-span-2 text-xs text-[#94a3b8] font-mono text-center py-6">Pipeline in progress...</div>}
            </div>
            {/* AF3 designs compact table */}
            {pVd.length>0&&(<div className="space-y-1">{pVd.map((d,i)=>(
              <div key={i} className="glass rounded px-3 py-1.5 flex items-center gap-3 text-[10px] font-mono">
                <span className="text-cyan w-5">#{d.rank}</span>
                <span className={`px-1.5 py-0.5 rounded-full ${d.confidence==='high'?'bg-ok/10 text-ok':d.confidence==='low_confidence'?'bg-warn/10 text-warn':'bg-bad/10 text-bad'}`}>{d.confidence||'—'}</span>
                <span className="text-[#e2e8f0]">ipTM: {d.iptm!=null?d.iptm:'—'}</span>
                <span className="text-[#a0aec0]">MPNN: {d.mpnn_score!=null?Number(d.mpnn_score).toFixed(3):'—'}</span>
                {d.af3_structure_path&&<View3DBtn path={d.af3_structure_path}/>}
              </div>
            ))}</div>)}
            {/* ADC radar + summary */}
            {(pa.nanobody_sequence||adcRadar)&&(<div className="grid grid-cols-2 gap-3">
              {adcRadar&&<div className="glass rounded-lg p-3"><ChartBox config={adcRadar} height={200}/></div>}
              <div className="glass rounded-lg p-3">
                <h4 className="text-[10px] text-[#a0aec0] font-mono mb-2 uppercase">ADC Assembly</h4>
                <div className="space-y-1.5 text-xs font-mono">
                  {pa.iptm!=null&&<div><span className="text-[#a0aec0]">ipTM: </span><span className="text-cyan font-semibold">{pa.iptm}</span></div>}
                  {pa.conjugation_site&&<div><span className="text-[#a0aec0]">Site: </span><span className="text-[#e2e8f0]">{pa.conjugation_site}</span></div>}
                  {pa.linker&&<div><span className="text-[#a0aec0]">Linker: </span><span className="text-purple">{pa.linker}</span></div>}
                  {pa.payload&&<div><span className="text-[#a0aec0]">Payload: </span><span className="text-[#e2e8f0]">{pa.payload}</span></div>}
                  {pa.dar&&<div><span className="text-[#a0aec0]">DAR: </span><span className="text-[#e2e8f0]">{pa.dar}</span></div>}
                </div>
                {pa.adc_smiles&&<div className="mt-2"><Mol2D smiles={pa.adc_smiles} w={300} h={120}/></div>}
              </div>
            </div>)}
            {pa.error&&(<div className="glass rounded-lg p-3 border-bad/30 border">
              <p className="text-xs text-bad font-mono">{pa.error}</p>
              {pa.partial&&<p className="text-[10px] text-[#a0aec0] mt-1">Pipeline partially completed</p>}
            </div>)}
            {dls.length>0&&(<div className="flex flex-wrap gap-2">
              {dls.map((d,i)=><DlBtn key={i} path={d.path} label={d.label}/>)}
              <button onClick={()=>{const b=new Blob([JSON.stringify(r,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`${r.job_name||'pipeline'}_report.json`;a.click();URL.revokeObjectURL(u)}}
                className="inline-flex items-center gap-1.5 px-2.5 py-1 text-[10px] font-mono text-cyan border border-cyan/30 rounded hover:bg-cyan/10 transition-all">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 6l3 3 3-3M2 10h8" stroke="currentColor" strokeWidth="1.2"/></svg>Full Report</button>
            </div>)}
          </div>);
        }
        // fallback: JSON
        return(<pre className="text-[10px] font-mono text-[#a0aec0] bg-black/20 rounded-lg p-3 overflow-auto max-h-[400px] whitespace-pre-wrap">{JSON.stringify(r,null,2)}</pre>);
      };

      return(<div className="flex h-full">
        {/* Left: tool tree */}
        <div className="w-[180px] flex-shrink-0 border-r border-border overflow-y-auto" style={{background:'rgba(8,12,24,0.4)'}}>
          <div className="px-3 py-2 border-b border-border">
            <span className="text-[10px] font-mono text-[#a0aec0] uppercase tracking-wider">Tools ({sortedTools.length})</span>
          </div>
          {sortedTools.map(([tool,tks])=>{
            const hasRunning=tks.some(t=>t.status==='running');
            const isOpen=hubTool===tool;
            return(<div key={tool}>
              <button onClick={()=>setHubTool(isOpen?null:tool)}
                className={`w-full px-3 py-2 flex items-center gap-2 text-left text-[11px] font-mono transition-all hover:bg-white/[0.03] ${isOpen?'bg-cyan/5 text-cyan':'text-[#a0aec0]'}`}>
                {hasRunning&&<div className="w-1.5 h-1.5 rounded-full bg-cyan glow-cyan flex-shrink-0"/>}
                <span className="flex-1 truncate">{TOOL_LABEL[tool]||tool}</span>
                <span className="text-[9px] px-1.5 py-0.5 rounded bg-white/5">{tks.length}</span>
                <span className="text-[9px]">{isOpen?'▾':'▸'}</span>
              </button>
              {isOpen&&tks.map(t=>{
                const s=ST[t.status]||ST.pending;
                const isSel=activeHubId===t.task_id;
                return(<button key={t.task_id} onClick={()=>{setHubTask(t.task_id);setSelectedTaskId(t.task_id);setUserLocked(true)}}
                  className={`w-full px-3 pl-6 py-1.5 flex items-center gap-2 text-[10px] font-mono hover:bg-white/[0.03] transition-all ${isSel?'bg-cyan/8 text-[#e2e8f0]':'text-[#a0aec0]'}`}>
                  <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{background:s.c}}/>
                  <span className="truncate flex-1">{t.task_id.slice(0,8)}</span>
                  <span className="text-[8px] flex-shrink-0" style={{color:s.c}}>{s.label}</span>
                  {t.status==='running'&&(
                    <button onClick={e=>{e.stopPropagation();cancelTask(t.task_id)}}
                      className="w-3 h-3 flex items-center justify-center rounded-full bg-red-500/20 border border-red-500/40 hover:bg-red-500/40 flex-shrink-0"
                      title="Cancel"><span className="text-[8px] text-[#f87171] leading-none">×</span></button>
                  )}
                </button>);
              })}
            </div>);
          })}
          {sortedTools.length===0&&<p className="text-xs text-[#94a3b8] text-center py-8">No tasks yet</p>}
        </div>
        {/* Right: task detail */}
        <div className="flex-1 overflow-y-auto p-4">
          {/* New task toast */}
          {newTaskToast&&<div className="glass rounded-lg px-3 py-2 mb-3 flex items-center gap-2 float-in border border-cyan/20">
            <div className="w-2 h-2 rounded-full bg-cyan glow-cyan"/>
            <span className="text-[11px] text-cyan font-mono">New task started</span>
            <button onClick={()=>{setSelectedTaskId(newTaskToast);setHubTask(newTaskToast);setNewTaskToast(null)}}
              className="text-[10px] text-cyan/70 hover:text-cyan font-mono ml-auto">Click to view →</button>
          </div>}
          {!selTask?(<div className="flex flex-col items-center justify-center h-full text-[#94a3b8]">
            <div className="text-3xl mb-3 opacity-30">🗂️</div>
            <p className="text-xs">Select a task from the left panel or the timeline</p>
          </div>):(
            <div className="space-y-3">
              <div className="flex items-center gap-3 flex-wrap">
                <span className="text-sm font-title font-semibold text-[#e2e8f0]">{TOOL_LABEL[selTask.tool]||selTask.tool}</span>
                <span className="text-[9px] px-2 py-0.5 rounded-full font-mono" style={{color:ST[selTask.status]?.c,background:`${ST[selTask.status]?.c}15`}}>{ST[selTask.status]?.label}</span>
                <span className="text-[10px] text-[#a0aec0] font-mono">{selTask.task_id.slice(0,12)}</span>
                <CopyBtn text={selTask.task_id}/>
                {selTask.started_at&&<span className="text-[10px] text-[#94a3b8] font-mono">{new Date(selTask.started_at).toLocaleTimeString()}</span>}
                {selTask.status==='running'&&(
                  <button onClick={()=>cancelTask(selTask.task_id)}
                    className="ml-auto px-2 py-0.5 text-[10px] font-mono text-[#f87171] border border-red-500/30 rounded hover:bg-red-500/10 transition-all">Cancel</button>
                )}
              </div>
              {selTask.progress_msg&&<p className="text-[11px] text-[#a0aec0] font-mono">{selTask.progress_msg}</p>}
              {selTask.status==='running'&&<Bar value={selTask.progress||0}/>}
              {selTask.error&&<div className="glass rounded-lg p-3 border-bad/20 border"><p className="text-xs text-bad font-mono">{selTask.error}</p></div>}
              {renderResult(selTask,selResult)}
            </div>
          )}
        </div>
      </div>);

    default: // chat
      const detectedPipeline=!loading&&chatInput.trim()?detectPipeline(chatInput):null;
      return(
        <div className="flex flex-col h-full">
          {/* Pipeline Preview */}
          {detectedPipeline&&showPreview&&(
            <div className="flex-shrink-0 mx-4 mt-3 glass rounded-xl px-4 py-3 float-in">
              <div className="flex items-center justify-between mb-2">
                <span className="text-[11px] font-mono text-cyan">Detected: {detectedPipeline.name}</span>
                <button onClick={()=>setShowPreview(false)} className="text-[#a0aec0] hover:text-[#e2e8f0] text-xs">×</button>
              </div>
              <div className="pp-flow">
                {detectedPipeline.steps.map((s,i)=>(
                  <React.Fragment key={i}>
                    {i>0&&<span className="pp-arrow">→</span>}
                    <div className="pp-step">
                      <span className="text-base">{s.icon}</span>
                      <span className="text-[#e2e8f0] font-mono whitespace-nowrap">{s.name}</span>
                      <span className="text-[#a0aec0]">{s.time}</span>
                    </div>
                  </React.Fragment>
                ))}
              </div>
            </div>
          )}
          <div className="flex-1 overflow-y-auto p-5 space-y-4">
            {chat.length===0&&!detectedPipeline&&(
              <div className="flex flex-col items-center justify-center h-full text-[#94a3b8]">
                <div className="text-5xl mb-4 opacity-30">🧬</div>
                <p className="text-sm">Describe your drug design task to begin.</p>
                <p className="text-xs text-[#94a3b8] mt-1">Qwen3-14B will plan and execute the full pipeline autonomously.</p>
              </div>
            )}
            {chat.map((m,i)=>{
              if(m.role==='user'){
                return(
                  <div key={i} className="flex justify-end float-in">
                    <div className="max-w-[80%]">
                      {m.attachLabels&&(
                        <div className="flex flex-wrap gap-1.5 justify-end mb-1.5">
                          {m.attachLabels.map((l,j)=><span key={j} className="attach-tag">{l}</span>)}
                        </div>
                      )}
                      <div className="px-4 py-3 rounded-2xl text-sm leading-relaxed bg-cyan/8 border border-cyan/15 text-[#e2e8f0] rounded-br-sm">
                        {m.content}
                      </div>
                    </div>
                  </div>
                );
              }
              // assistant
              const ptmInfo=parsePtmCard(m.content||'');
              return(
                <div key={i} className="flex justify-start float-in">
                  <div className="max-w-[80%]">
                    <div className="glass px-4 py-3 rounded-2xl text-sm leading-relaxed text-[#e2e8f0] rounded-bl-sm">
                      <div dangerouslySetInnerHTML={{__html:marked.parse(m.content)}} className="prose prose-invert prose-sm max-w-none
                          [&_code]:bg-white/5 [&_code]:px-1.5 [&_code]:py-0.5 [&_code]:rounded [&_code]:text-cyan [&_code]:text-xs
                          [&_pre]:bg-black/30 [&_pre]:rounded-lg [&_pre]:p-3
                          [&_a]:text-cyan [&_a]:no-underline [&_a:hover]:underline
                          [&_h1]:text-base [&_h2]:text-sm [&_h3]:text-sm
                          [&_table]:text-xs [&_th]:text-left [&_td]:px-2 [&_td]:py-1"/>
                    </div>
                    {ptmInfo&&(
                      <div className="ptm-card float-in">
                        {ptmInfo.map((line,j)=>(
                          <div key={j} className={line.type==='title'?'ptm-title':line.type==='warn'?'ptm-warn':line.type==='file'?'ptm-file':'ptm-ok'}>
                            {line.text}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
            {loading&&(
              pipelineStarted?(
                <div className="flex items-center gap-2 pl-2 float-in glass px-4 py-2.5 rounded-2xl rounded-bl-sm max-w-[80%]">
                  <span className="text-sm">⚡</span>
                  <span className="text-xs text-cyan font-mono">Pipeline started — track progress in the left panel</span>
                </div>
              ):(
                <div className="flex items-center gap-1.5 pl-2 float-in">
                  {[0,1,2].map(i=><div key={i} className="w-1.5 h-1.5 rounded-full bg-cyan typing-dot" style={{animationDelay:`${i*0.15}s`}}/>)}
                  <span className="text-xs text-[#94a3b8] ml-2">Thinking...</span>
                </div>
              )
            )}
            <div ref={chatEndRef}/>
          </div>
          {/* ── Chat input bar ── */}
          <div className="flex-shrink-0 p-3 border-t border-border glass-strong">
            {/* attachment tags */}
            {(attachPdb||attachFasta||attachSmiles)&&(
              <div className="flex flex-wrap gap-1.5 mb-2 px-1">
                {attachPdb&&<span className="attach-tag">📄 {attachPdb.filename} <span className="tag-close" onClick={()=>setAttachPdb(null)}>×</span></span>}
                {attachFasta&&<span className="attach-tag">🧬 序列 {attachFasta.replace(/^>[^\n]*\n/,'').replace(/\s/g,'').length}aa <span className="tag-close" onClick={()=>setAttachFasta(null)}>×</span></span>}
                {attachSmiles&&<span className="attach-tag">💊 {attachSmiles.length>25?attachSmiles.slice(0,22)+'...':attachSmiles} <span className="tag-close" onClick={()=>setAttachSmiles(null)}>×</span></span>}
              </div>
            )}
            <div className="flex gap-2 items-center">
              {/* 📎 button */}
              <div className="relative" ref={attachMenuRef}>
                <button onClick={()=>setShowAttachMenu(v=>!v)}
                  className={`p-2.5 rounded-xl border transition-all ${showAttachMenu?'border-cyan/40 text-cyan':'border-border text-[#a0aec0] hover:text-[#e2e8f0] hover:border-[#a0aec0]'}`}>
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 8l-5.5 5.5a3.5 3.5 0 01-5-5L9 3a2.5 2.5 0 013.5 3.5l-5.5 5a1.5 1.5 0 01-2-2L10.5 4" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
                </button>
                {showAttachMenu&&(
                  <div className="attach-menu glass-strong rounded-xl overflow-hidden">
                    <button onClick={()=>{pdbInputRef.current?.click()}}>
                      <span>📂</span><span>上传 PDB / CIF</span>
                    </button>
                    <button onClick={()=>{setShowAttachMenu(false);setPasteModal('fasta');setPasteValue(attachFasta||'')}}>
                      <span>🧬</span><span>粘贴 FASTA 序列</span>
                    </button>
                    <button onClick={()=>{setShowAttachMenu(false);setPasteModal('smiles');setPasteValue(attachSmiles||'')}}>
                      <span>💊</span><span>粘贴 SMILES</span>
                    </button>
                  </div>
                )}
                <input ref={pdbInputRef} type="file" accept=".pdb,.cif" className="hidden" onChange={handlePdbFile}/>
              </div>
              <input ref={chatInputRef} value={chatInput} onChange={e=>setChatInput(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}}}
                placeholder="Describe your task or ask a question..."
                disabled={loading}
                className="flex-1 px-4 py-2.5 bg-[#1e2433] border border-border rounded-xl text-sm text-[#e2e8f0]
                  placeholder-[#6b7280] focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/15
                  font-mono transition-all disabled:opacity-40"/>
              <button onClick={sendChat} disabled={loading||!chatInput.trim()}
                className="px-5 py-2.5 bg-gradient-to-r from-cyan to-purple text-deep font-mono font-bold text-sm rounded-xl
                  hover:shadow-lg hover:shadow-cyan/20 disabled:opacity-25 disabled:cursor-not-allowed transition-all">
                {loading?<span className="typing-dot">···</span>:'Run'}
              </button>
            </div>
          </div>
        </div>
      );
    }
  };

  return(
    <div className="flex flex-col h-screen">
      {/* ── Top Bar ─────────────────────────────────────────────────────── */}
      <header className="flex-shrink-0 glass-strong border-b border-border">
        <div className="max-w-[1800px] mx-auto px-6 py-4 flex items-center gap-6">
          {/* logo */}
          <div className="flex items-center gap-3 flex-shrink-0">
            <div className="w-3 h-3 rounded-full bg-cyan glow-cyan"/>
            <span className="text-lg font-title font-bold tracking-tight text-white">OIH</span>
            <span className="text-xs text-[#a0aec0] font-mono hidden sm:inline">Open Intelligence Hub</span>
          </div>

          <div className="flex-1"/>

          {/* Export Report */}
          <button onClick={()=>setShowReport(true)}
            className="px-3 py-1.5 text-xs font-mono rounded-lg border border-border text-[#a0aec0]
              hover:border-cyan/40 hover:text-cyan transition-all flex items-center gap-1.5">
            <span>📄</span> Export Report
          </button>

          {/* GPU dot */}
          <GpuDot health={health}/>
        </div>

        {/* examples */}
        <div className="max-w-[1800px] mx-auto px-6 pb-3 flex gap-2 overflow-x-auto">
          {EXAMPLES.map((ex,i)=>(
            <button key={i} onClick={()=>{setChatInput(ex.text);chatInputRef.current?.focus()}}
              className="flex-shrink-0 px-3 py-1 text-[11px] font-mono text-[#a0aec0] glass rounded-full
                hover:border-cyan/30 hover:text-cyan transition-all">
              <span className="mr-1">{ex.icon}</span>{ex.text.slice(0,24)}...
            </button>
          ))}
        </div>
      </header>

      {/* ── Body ────────────────────────────────────────────────────────── */}
      <div className="flex-1 flex overflow-hidden">
        {/* Left: Timeline */}
        <aside className="w-[300px] flex-shrink-0 border-r border-border overflow-y-auto" style={{background:'rgba(8,12,24,0.5)'}}>
          <div className="px-4 py-3 border-b border-border flex items-center justify-between">
            <span className="text-[10px] font-mono tracking-[0.2em] text-[#a0aec0] uppercase">Agent Pipeline</span>
            <span className="text-[10px] font-mono text-[#94a3b8]">{tasks.filter(t=>t.status==='running').length} active</span>
          </div>
          <div className="p-3">
            {tasks.length===0
              ?<p className="text-xs text-[#94a3b8] text-center py-12">Waiting for tasks...</p>
              :(()=>{
                // Identify pipeline tasks and group children
                const PIPELINE_TOOLS=new Set(['binder_design_pipeline','drug_discovery_pipeline']);
                const pipelines=tasks.filter(t=>PIPELINE_TOOLS.has(t.tool));
                const childIds=new Set();
                const pipelineChildren={};
                for(const pl of pipelines){
                  const start=new Date(pl.started_at||pl.created_at).getTime();
                  const end=pl.completed_at?new Date(pl.completed_at).getTime():Date.now();
                  const children=tasks.filter(t=>{
                    if(t.task_id===pl.task_id||PIPELINE_TOOLS.has(t.tool))return false;
                    const ct=new Date(t.created_at).getTime();
                    return ct>=start-2000&&ct<=end+2000; // 2s tolerance
                  });
                  pipelineChildren[pl.task_id]=children;
                  children.forEach(c=>childIds.add(c.task_id));
                }
                // Top-level = pipelines + non-child tasks, sorted newest first
                const topLevel=tasks.filter(t=>!childIds.has(t.task_id))
                  .sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
                return topLevel.map((t,i)=>{
                  const children=pipelineChildren[t.task_id];
                  return(<div key={t.task_id}>
                    <TimelineNode task={t} isLast={i===topLevel.length-1&&!children?.length}
                      selected={selectedTaskId===t.task_id}
                      onSelect={(id)=>{setSelectedTaskId(id);setUserLocked(true);setActiveTab('hub')}}
                      onCancel={cancelTask}/>
                    {children?.length>0&&(()=>{
                      // Group children by tool, show summary
                      const byTool={};
                      children.forEach(c=>{const k=c.tool||'unknown';if(!byTool[k])byTool[k]=[];byTool[k].push(c)});
                      return(<div className="pl-12 pb-3 -mt-2 space-y-1">
                        {Object.entries(byTool).map(([tool,tks])=>{
                          const done=tks.filter(t=>t.status==='completed').length;
                          const running=tks.filter(t=>t.status==='running').length;
                          const failed=tks.filter(t=>t.status==='failed').length;
                          return(<div key={tool} className="flex items-center gap-2 text-[10px] font-mono text-[#a0aec0] px-2 py-1 rounded bg-white/[0.02]">
                            <span className="text-[#e2e8f0]">{TOOL_LABEL[tool]||tool}</span>
                            <span className="text-[#94a3b8]">×{tks.length}</span>
                            {done>0&&<span className="text-ok">✓{done}</span>}
                            {running>0&&<span className="text-cyan">⏳{running}</span>}
                            {failed>0&&<span className="text-bad">✗{failed}</span>}
                          </div>);
                        })}
                      </div>);
                    })()}
                  </div>);
                });
              })()
            }
          </div>
        </aside>

        {/* Right: Results */}
        <section className="flex-1 flex flex-col overflow-hidden">
          <Tabs items={tabs} active={activeTab} onSelect={setActiveTab} runningTools={runningTools} recentDone={recentDone}/>
          <div className="flex-1 overflow-y-auto border-t border-border/50 relative">
            {/* Onboarding banner — shows when pipeline starts and chat tab is active */}
            {onboardBanner&&activeTab==='chat'&&(
              <div onClick={()=>setOnboardBanner(false)}
                className="mx-4 mt-3 px-4 py-3 rounded-xl cursor-pointer transition-all
                  bg-gradient-to-r from-cyan/10 to-purple/10 border border-cyan/20
                  hover:border-cyan/40 float-in">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-xs font-title font-semibold text-cyan">Pipeline running — explore results as they arrive</span>
                  <span className="text-[10px] text-[#94a3b8] hover:text-[#e2e8f0]">dismiss</span>
                </div>
                <div className="flex flex-wrap gap-3 text-[11px] font-mono text-[#a0aec0]">
                  <span onClick={e=>{e.stopPropagation();setActiveTab('hub');setOnboardBanner(false)}}
                    className="hover:text-cyan cursor-pointer">📊 Results Hub — step-by-step progress</span>
                  <span onClick={e=>{e.stopPropagation();setActiveTab('protein');setOnboardBanner(false)}}
                    className="hover:text-cyan cursor-pointer">🧬 Protein 3D — visualize structures</span>
                  <span onClick={e=>{e.stopPropagation();setActiveTab('hub');setOnboardBanner(false)}}
                    className="hover:text-cyan cursor-pointer">📁 Results Hub — all tool results</span>
                </div>
              </div>
            )}
            {tabContent()}
            {/* Persistent 3Dmol container — always mounted, shown/hidden via display */}
            <Viewer3DPersistent viewer3d={viewer3d} visible={activeTab==='protein'} path={viewerPath||rd.cif||rd.pdb}/>
          </div>
        </section>
      </div>

      {/* ── Paste Modal ──────────────────────────────────────────────────── */}
      {pasteModal&&(
        <div className="paste-modal" onClick={e=>{if(e.target===e.currentTarget){setPasteModal(null);setPasteValue('')}}}>
          <div className="paste-modal-inner">
            <h3 className="text-sm font-title font-semibold text-[#e2e8f0] mb-3">
              {pasteModal==='fasta'?'🧬 粘贴 FASTA 序列':'💊 粘贴 SMILES'}
            </h3>
            {pasteModal==='fasta'
              ?<textarea value={pasteValue} onChange={e=>setPasteValue(e.target.value)}
                placeholder={">sequence_name\nMKTIIALSYIFCLVFA..."}
                rows={6}
                className="w-full px-3 py-2.5 bg-[#1e2433] border border-border rounded-lg text-sm text-[#e2e8f0] placeholder-[#6b7280] font-mono focus:outline-none focus:border-cyan/40 resize-none"/>
              :<input value={pasteValue} onChange={e=>setPasteValue(e.target.value)}
                placeholder="CC(=O)Oc1ccccc1C(=O)O"
                onKeyDown={e=>{if(e.key==='Enter')confirmPaste()}}
                className="w-full px-3 py-2.5 bg-[#1e2433] border border-border rounded-lg text-sm text-[#e2e8f0] placeholder-[#6b7280] font-mono focus:outline-none focus:border-cyan/40"/>
            }
            <div className="flex justify-end gap-2 mt-3">
              <button onClick={()=>{setPasteModal(null);setPasteValue('')}}
                className="px-4 py-1.5 text-xs font-mono text-[#a0aec0] hover:text-[#e2e8f0] transition-all">取消</button>
              <button onClick={confirmPaste} disabled={!pasteValue.trim()}
                className="px-4 py-1.5 text-xs font-mono bg-cyan/15 text-cyan border border-cyan/30 rounded-lg hover:bg-cyan/25 disabled:opacity-30 transition-all">确认</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Footer ──────────────────────────────────────────────────────── */}
      <footer className="flex-shrink-0 glass-strong border-t border-border px-6 py-2 flex items-center gap-6 text-[10px] font-mono text-[#94a3b8]">
        <span className="flex items-center gap-2">
          <span className={`w-1.5 h-1.5 rounded-full ${health?.status==='ok'?'bg-ok':'bg-bad'}`}/>
          {health?.status==='ok'?'ALL SYSTEMS OPERATIONAL':'CONNECTING...'}
        </span>
        {health&&<>
          <span>CPU Queue: <span className="text-[#a0aec0]">{health.task_queue?.cpu_active||0}/{health.task_queue?.cpu_slots||8}</span></span>
          <span>GPU Queue: <span className="text-[#a0aec0]">{health.task_queue?.gpu_active||0}/{health.task_queue?.gpu_slots||3}</span></span>
          {health.task_queue?.pending_total>0&&<span className="text-warn">PENDING: {health.task_queue.pending_total}</span>}
          <span className="flex-1"/>
          <span className="text-[#94a3b8]">Containers: {Object.values(health.containers||{}).filter(v=>v==='running').length}/{Object.keys(health.containers||{}).length}</span>
        </>}
        <span className="text-[#94a3b8]">192.168.31.23 | Qwen3-14B + 18 Tools</span>
      </footer>
      <ExportReportModal show={showReport} onClose={()=>setShowReport(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
